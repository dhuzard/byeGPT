
services:
  # ── Backend (FastAPI + Playwright + notebooklm-py) ────────────────────────
  backend:
    build:
      context: .          # repo root so COPY src/ and COPY core/ work correctly
      dockerfile: backend/Dockerfile
    image: byegpt-studio-backend:latest
    container_name: byegpt-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist session cookies and generated files between restarts
      - .byegpt:/app/.byegpt
      - ./assets:/app/assets
      - tusd_data:/app/.uploads
    environment:
      - BYEGPT_STORAGE=/app/.byegpt
      - BYEGPT_TUSD_UPLOAD_DIR=/app/.uploads
      - BYEGPT_DEMO_MODE=true
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  tusd:
    image: tusproject/tusd:latest
    container_name: byegpt-tusd
    user: "0:0"
    command:
      - -host=0.0.0.0
      - -port=1080
      - -upload-dir=/data
    ports:
      - "1080:1080"
    volumes:
      - tusd_data:/data
    restart: unless-stopped

  # ── Frontend (React + Vite) ───────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: byegpt-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # named volume for easier cleanup
    environment:
      - VITE_API_BASE=http://localhost:8000
      - VITE_API_PROXY_TARGET=http://backend:8000
      - VITE_TUSD_ENDPOINT=http://127.0.0.1:1080/files
    depends_on:
      - backend
      - tusd
    restart: unless-stopped

volumes:
  frontend_node_modules:
  tusd_data:
