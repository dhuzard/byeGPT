
services:
  # ── Backend (FastAPI + Playwright + notebooklm-py) ────────────────────────
  backend:
    build:
      context: .          # repo root so COPY src/ and COPY core/ work correctly
      dockerfile: backend/Dockerfile
    image: byegpt-studio-backend:latest
    container_name: byegpt-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist session cookies and generated files between restarts
      - .byegpt:/app/.byegpt
      - ./assets:/app/assets
    environment:
      - BYEGPT_STORAGE=/app/.byegpt
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React + Vite) ───────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: byegpt-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # named volume for easier cleanup
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
